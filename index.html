<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mass Actualization</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
  <link rel="stylesheet" href="styles.css">

  <script type="importmap">
    {
      "imports": {
        "diff": "https://cdn.jsdelivr.net/npm/diff@7.0.0/+esm"
      }
    }
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

  <div id="app" x-data="appRoot()" x-init="init()" x-cloak>

    <!-- Loading state -->
    <template x-if="loading">
      <div class="flex items-center justify-center min-h-screen">
        <div class="text-slate-500">Загружаем кампанию...</div>
      </div>
    </template>

    <!-- Error state -->
    <template x-if="error">
      <div class="flex items-center justify-center min-h-screen p-8">
        <div class="max-w-lg bg-red-50 border border-red-200 rounded p-4">
          <div class="font-semibold text-red-800">Ошибка</div>
          <div class="text-sm text-red-700 mt-1" x-text="error"></div>
        </div>
      </div>
    </template>

    <!-- Routed content -->
    <template x-if="!loading && !error">
      <div>
        <header class="bg-white border-b border-slate-200">
          <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <div>
              <div class="text-sm text-slate-500">Campaign</div>
              <div class="font-semibold" x-text="state.campaign.topic"></div>
            </div>
            <div class="text-sm text-slate-600">
              <span x-text="state.progress.reviewed"></span> /
              <span x-text="state.progress.total"></span> reviewed
            </div>
          </div>
          <div class="h-1 bg-slate-200">
            <div class="h-full bg-emerald-500 transition-all"
                 :style="`width: ${(state.progress.reviewed / Math.max(1, state.progress.total)) * 100}%`"></div>
          </div>
        </header>

        <main class="max-w-5xl mx-auto px-4 py-6">
          <template x-if="screen === 'overview'">
            <div x-data="overviewScreen()" x-init="init()">
              <h1 class="text-xl font-semibold mb-1">Stories</h1>
              <div class="text-sm text-slate-500 mb-4">
                <span x-text="$root.groups.length"></span> stories,
                <span x-text="$root.state.progress.total"></span> blocks
              </div>

              <ul class="bg-white border border-slate-200 rounded divide-y divide-slate-200">
                <template x-for="g in $root.groups" :key="g.story_id">
                  <li class="hover:bg-slate-50 cursor-pointer"
                      @click="$root.goToStory(g.story_id)">
                    <div class="px-4 py-3 flex items-center justify-between gap-4">
                      <div class="min-w-0">
                        <div class="font-medium truncate" x-text="g.story_name"></div>
                        <div class="text-xs text-slate-500 mt-0.5">
                          <span class="uppercase font-mono mr-2" x-text="g.locale"></span>
                          <span x-text="g.story_full_slug"></span>
                        </div>
                      </div>
                      <div class="flex items-center gap-2 shrink-0">
                        <template x-for="badge in storyBadges(g)" :key="badge.label">
                          <span class="text-xs px-2 py-0.5 rounded"
                                :class="badge.classes"
                                x-text="badge.label + ': ' + badge.count"></span>
                        </template>
                      </div>
                    </div>
                  </li>
                </template>
              </ul>
            </div>
          </template>

          <template x-if="screen === 'story'">
            <div x-data="storyScreen()" x-init="init()">
              <button class="text-sm text-slate-500 hover:text-slate-900 mb-3"
                      @click="$root.goToOverview()">← все stories</button>

              <template x-if="!group">
                <div class="text-slate-500">Загружаем story...</div>
              </template>

              <template x-if="group">
                <div>
                  <div class="mb-4">
                    <div class="text-xs text-slate-500 uppercase font-mono" x-text="group.locale"></div>
                    <h1 class="text-xl font-semibold" x-text="group.story_name"></h1>
                    <div class="text-xs text-slate-500" x-text="group.story_full_slug"></div>
                  </div>

                  <ul class="space-y-4">
                    <template x-for="block in group.blocks" :key="block.row_id">
                      <li class="bg-white border border-slate-200 rounded p-4"
                          x-data="blockCard(block)" x-init="init($root)">
                        <div class="flex items-center justify-between mb-2">
                          <div class="text-sm">
                            <span class="font-mono text-slate-500" x-text="block.block_component"></span>
                            <span class="text-slate-400 mx-1">·</span>
                            <span class="font-mono text-slate-400" x-text="block.block_path"></span>
                          </div>
                          <span class="text-xs px-2 py-0.5 rounded"
                                :class="statusBadgeClasses(block.status)"
                                x-text="block.status"></span>
                        </div>

                        <div class="text-xs text-slate-500 italic mb-3" x-text="'LLM: ' + block.llm_match_reason"></div>

                        <!-- Per-field diff cards -->
                        <div class="space-y-3">
                          <template x-for="fieldName in fieldsToShow(block)" :key="fieldName">
                            <div class="border border-slate-100 rounded p-3 bg-slate-50">
                              <div class="text-xs font-mono text-slate-500 mb-2" x-text="fieldName"></div>
                              <div class="diff-output text-sm"
                                   x-html="$root.diffHTML(
                                     block.original_payload[fieldName],
                                     (block.edited_payload && block.edited_payload[fieldName] != null
                                        ? block.edited_payload[fieldName]
                                        : block.proposed_payload[fieldName])
                                   )"></div>
                            </div>
                          </template>
                        </div>

                        <!-- Action buttons (filled in Task 9-12) -->
                        <div class="flex flex-wrap gap-2 mt-4"
                             x-data="blockActions(block)" x-init="init($root)">

                          <template x-if="block.status === 'proposed' || block.status === 'pending' || block.status === 'error'">
                            <div class="w-full">
                              <div class="flex flex-wrap gap-2" x-show="!editing">
                                <button class="px-3 py-1.5 text-sm rounded bg-emerald-600 text-white hover:bg-emerald-700 disabled:opacity-50"
                                        :disabled="busy"
                                        @click="onAccept()">✅ Accept</button>
                                <button class="px-3 py-1.5 text-sm rounded bg-amber-500 text-white hover:bg-amber-600 disabled:opacity-50"
                                        :disabled="busy"
                                        @click="startEdit()">✏️ Edit</button>
                                <button class="px-3 py-1.5 text-sm rounded bg-slate-500 text-white hover:bg-slate-600 disabled:opacity-50"
                                        :disabled="busy"
                                        @click="openSkipModal()">⏭️ Skip</button>
                              </div>

                              <div x-show="editing" class="space-y-3">
                                <template x-for="fieldName in Object.keys(block.original_payload)" :key="fieldName">
                                  <div>
                                    <div class="text-xs font-mono text-slate-500 mb-1" x-text="fieldName"></div>
                                    <textarea class="w-full border border-slate-300 rounded p-2 text-sm font-mono"
                                              rows="4"
                                              x-model="editedFields[fieldName]"></textarea>
                                  </div>
                                </template>
                                <div class="flex gap-2">
                                  <button class="px-3 py-1.5 text-sm rounded bg-emerald-600 text-white hover:bg-emerald-700 disabled:opacity-50"
                                          :disabled="busy"
                                          @click="onAcceptEdited()">Save & Apply</button>
                                  <button class="px-3 py-1.5 text-sm rounded border border-slate-300 hover:bg-slate-50"
                                          :disabled="busy"
                                          @click="cancelEdit()">Cancel</button>
                                </div>
                              </div>
                            </div>
                          </template>

                          <template x-if="['accepted','edited','skipped','deleted'].includes(block.status)">
                            <div class="text-xs text-slate-500">
                              Decided: <span class="font-medium" x-text="block.status"></span>
                            </div>
                          </template>

                          <template x-if="error">
                            <div class="text-xs text-red-700" x-text="'Ошибка: ' + error"></div>
                          </template>

                          <div x-show="skipModal"
                               class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4"
                               @click.self="closeSkipModal()">
                            <div class="bg-white rounded shadow-lg max-w-md w-full p-5">
                              <h3 class="font-semibold mb-3">Skip block: причина</h3>

                              <div class="space-y-2 text-sm">
                                <template x-for="opt in skipReasonOptions" :key="opt.value">
                                  <label class="flex items-start gap-2 cursor-pointer">
                                    <input type="radio" :value="opt.value" x-model="skipForm.category" class="mt-1">
                                    <span x-text="opt.label"></span>
                                  </label>
                                </template>
                              </div>

                              <textarea class="w-full border border-slate-300 rounded p-2 text-sm mt-3"
                                        rows="3" placeholder="Комментарий (опционально)"
                                        x-model="skipForm.comment"></textarea>

                              <div class="flex justify-end gap-2 mt-4">
                                <button class="px-3 py-1.5 text-sm rounded border border-slate-300 hover:bg-slate-50"
                                        @click="closeSkipModal()">Cancel</button>
                                <button class="px-3 py-1.5 text-sm rounded bg-slate-700 text-white hover:bg-slate-900 disabled:opacity-50"
                                        :disabled="busy"
                                        @click="confirmSkip()">Skip</button>
                              </div>
                            </div>
                          </div>
                        </div>
                      </li>
                    </template>
                  </ul>

                  <div class="mt-6 flex justify-between">
                    <button class="px-4 py-2 text-sm rounded border border-slate-300 hover:bg-slate-50"
                            @click="$root.goToOverview()">К списку</button>
                    <button class="px-4 py-2 text-sm rounded bg-slate-900 text-white hover:bg-slate-700 disabled:opacity-50"
                            :disabled="hasPendingBlocks()"
                            @click="$root.advanceToNextStory()">Save & Next Story</button>
                  </div>
                </div>
              </template>
            </div>
          </template>

          <template x-if="screen === 'done'">
            <div>
              <!-- filled in Task 15 -->
              <div class="text-slate-500">Done screen — placeholder</div>
            </div>
          </template>
        </main>
      </div>
    </template>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>

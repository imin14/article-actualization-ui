<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <link rel="icon" type="image/svg+xml" href="assets/logo-icon.svg">
  <title>Mass Actualization · IMIN</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="styles.css">

  <script type="importmap">
    {
      "imports": {
        "diff": "https://cdn.jsdelivr.net/npm/diff@7.0.0/+esm",
        "alpinejs": "https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/module.esm.min.js"
      }
    }
  </script>
</head>
<body class="min-h-screen">

  <div id="app" x-data="appRoot()" x-init="init()" x-cloak
       @keydown.window="onGlobalKey($event)">

    <!-- Loading state — branded skeleton -->
    <template x-if="loading">
      <div class="min-h-screen flex flex-col">
        <header class="bg-white border-b border-[var(--imin-border)]">
          <div class="max-w-5xl mx-auto px-6 py-4 flex items-center gap-4">
            <img src="assets/logo.svg" alt="Immigrant Invest" class="h-7 opacity-80">
            <div class="ml-auto skeleton h-4 w-24"></div>
          </div>
        </header>
        <main class="max-w-5xl mx-auto px-6 py-8 w-full space-y-3">
          <div class="skeleton h-8 w-48"></div>
          <div class="skeleton h-4 w-32"></div>
          <div class="space-y-3 mt-6">
            <div class="skeleton h-16 w-full"></div>
            <div class="skeleton h-16 w-full"></div>
            <div class="skeleton h-16 w-full"></div>
          </div>
        </main>
      </div>
    </template>

    <!-- Error state -->
    <template x-if="error">
      <div class="flex items-center justify-center min-h-screen p-8 animate-fade-in">
        <div class="card max-w-lg w-full p-6 border-red-200 bg-red-50">
          <div class="flex items-start gap-3">
            <div class="text-2xl leading-none">⚠️</div>
            <div class="flex-1">
              <div class="font-semibold text-red-900" x-text="t('error.title')"></div>
              <div class="text-sm text-red-800 mt-1" x-text="error"></div>
              <template x-if="hasToken">
                <button type="button"
                        @click="logout()"
                        class="btn btn-ghost mt-4"
                        x-text="t('header.logout')"></button>
              </template>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- Auth gate — shown when API_MODE='real' but no token in localStorage. -->
    <template x-if="!loading && !error && screen === 'auth'">
      <div class="flex items-center justify-center min-h-screen p-8 animate-fade-in">
        <div class="card max-w-md w-full p-7">
          <div class="flex items-center gap-3 mb-5">
            <a href="https://immigrantinvest.com/" target="_blank" rel="noopener" title="immigrantinvest.com">
              <img src="assets/logo.svg" alt="Immigrant Invest" class="h-7 transition-opacity hover:opacity-80">
            </a>
          </div>
          <div class="flex items-center justify-between mb-1.5 gap-3">
            <h1 class="text-xl font-semibold text-[var(--imin-text)]" x-text="t('auth.title')"></h1>
            <button type="button" class="btn btn-ghost text-xs uppercase tracking-wider"
                    @click="toggleLocale()"
                    :title="t('header.lang_switch_title')"
                    x-text="locale === 'ru' ? 'EN' : 'RU'"></button>
          </div>
          <p class="text-sm text-[var(--imin-text-muted)] mb-5" x-text="t('auth.subtitle')"></p>
          <form @submit.prevent="submitAuthToken()">
            <label class="block">
              <span class="block text-xs font-medium text-[var(--imin-text-muted)] uppercase tracking-wide mb-1.5" x-text="t('auth.token_label')"></span>
              <input type="password"
                     x-model="authForm.token"
                     :disabled="authForm.saving"
                     autocomplete="current-password"
                     autofocus
                     :placeholder="t('auth.token_placeholder')"
                     class="w-full px-3 py-2 text-sm rounded-lg border border-[var(--imin-border)] bg-white/80 backdrop-blur focus:outline-none focus:ring-2 focus:ring-[var(--imin-navy)]/30 focus:border-[var(--imin-navy)]/40">
            </label>
            <template x-if="authForm.error">
              <div class="mt-3 text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg px-3 py-2"
                   x-text="authForm.error"></div>
            </template>
            <button type="submit"
                    :disabled="authForm.saving || !authForm.token"
                    class="btn btn-primary w-full mt-5 justify-center">
              <span x-show="!authForm.saving" x-text="t('auth.submit')"></span>
              <span x-show="authForm.saving" x-text="t('auth.submitting')"></span>
            </button>
          </form>
          <p class="text-xs text-[var(--imin-text-subtle)] mt-5 leading-relaxed" x-text="t('auth.footer_note')"></p>
        </div>
      </div>
    </template>

    <!-- Campaigns picker — landing screen for authenticated users without ?campaign= -->
    <template x-if="!loading && !error && screen === 'campaigns'">
      <div class="min-h-screen flex flex-col">
        <header class="glass-header sticky top-0 z-30">
          <div class="max-w-5xl mx-auto px-6 py-4 flex items-center gap-6">
            <a href="https://immigrantinvest.com/" target="_blank" rel="noopener" class="shrink-0" :title="t('header.brand_alt')">
              <img src="assets/logo.svg" :alt="t('header.brand_alt')" class="h-7 transition-opacity hover:opacity-80">
            </a>
            <div class="flex-1"></div>
            <button type="button" class="btn btn-ghost shrink-0 text-xs uppercase tracking-wider"
                    @click="toggleLocale()"
                    :title="t('header.lang_switch_title')"
                    x-text="locale === 'ru' ? 'EN' : 'RU'"></button>
            <template x-if="hasToken">
              <button type="button" @click="logout()" class="btn btn-ghost shrink-0" :title="t('header.logout_title')" x-text="t('header.logout')"></button>
            </template>
          </div>
        </header>

        <main class="max-w-5xl mx-auto px-6 py-8 w-full">
          <div class="flex items-end justify-between mb-6 gap-3">
            <div>
              <h1 class="text-2xl font-bold text-[var(--imin-text)] tracking-tight" x-text="t('campaigns.title')"></h1>
              <div class="text-sm text-[var(--imin-text-muted)] mt-1" x-text="t('campaigns.count', { count: campaigns.length })"></div>
            </div>
            <div class="flex items-center gap-2">
              <button class="btn btn-ghost" @click="loadCampaigns()" :disabled="campaignsLoading">
                <svg class="w-3.5 h-3.5" :class="campaignsLoading ? 'animate-spin' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                <span x-text="t('campaigns.refresh')"></span>
              </button>
              <button class="btn btn-primary" @click="goToSearch()">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span x-text="t('campaigns.new')"></span>
              </button>
            </div>
          </div>

          <template x-if="campaignsError">
            <div class="card p-4 mb-4 border-red-200 bg-red-50 text-sm text-red-800" x-text="campaignsError"></div>
          </template>

          <template x-if="campaignsLoading && !campaigns.length">
            <div class="space-y-3">
              <div class="skeleton h-16 w-full"></div>
              <div class="skeleton h-16 w-full"></div>
              <div class="skeleton h-16 w-full"></div>
            </div>
          </template>

          <template x-if="!campaignsLoading && !campaigns.length && !campaignsError">
            <div class="card p-8 text-center">
              <div class="text-2xl mb-2">∅</div>
              <div class="font-semibold text-[var(--imin-text)] mb-1" x-text="t('campaigns.empty')"></div>
              <div class="text-sm text-[var(--imin-text-muted)] mb-5" x-text="t('campaigns.empty_subtitle')"></div>
              <button class="btn btn-primary" @click="goToSearch()" x-text="t('campaigns.empty_cta')"></button>
            </div>
          </template>

          <ul class="list-stack stagger-fade" x-show="campaigns.length">
            <template x-for="c in campaigns" :key="c.id">
              <li class="card card-interactive group" @click="openCampaign(c.id)">
                <div class="px-5 py-4 flex items-center justify-between gap-4">
                  <div class="min-w-0 flex-1">
                    <div class="flex items-center gap-2 mb-1">
                      <span class="locale-chip" x-text="c.source_locale || 'ru'"></span>
                      <span class="slug-mono truncate" x-text="c.id"></span>
                    </div>
                    <div class="font-medium text-[15px] text-[var(--imin-text)] truncate" x-text="c.topic || c.id"></div>
                    <div class="text-xs text-[var(--imin-text-muted)] mt-1">
                      <span x-text="c.total"></span> <span x-text="t('campaigns.item.blocks')"></span>
                      <template x-if="c.last_updated_at">
                        <span> · <span x-text="t('campaigns.item.updated')"></span> <span x-text="new Date(c.last_updated_at).toLocaleString(locale === 'en' ? 'en-US' : 'ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })"></span></span>
                      </template>
                    </div>
                  </div>
                  <div class="flex items-center gap-2 shrink-0">
                    <span class="badge"
                          :class="{
                            'badge-success': campaignStatus(c).tone === 'success',
                            'badge-warning': campaignStatus(c).tone === 'warning',
                            'badge-progress': campaignStatus(c).tone === 'progress',
                            'badge-neutral': campaignStatus(c).tone === 'neutral'
                          }"
                          x-text="campaignStatus(c).label"></span>
                    <svg class="w-4 h-4 text-[var(--imin-text-subtle)] transition-transform group-hover:translate-x-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                  </div>
                </div>
              </li>
            </template>
          </ul>
        </main>
      </div>
    </template>

    <!-- Routed content -->
    <template x-if="!loading && !error && screen !== 'auth' && screen !== 'campaigns'">
      <div>
        <!-- Header — logo + campaign + progress -->
        <header class="glass-header sticky top-0 z-30">
          <div class="max-w-5xl mx-auto px-6 py-4 flex items-center gap-6">
            <a href="https://immigrantinvest.com/" target="_blank" rel="noopener" class="shrink-0 flex items-center gap-3 group" :title="t('header.brand_alt')">
              <img src="assets/logo.svg" :alt="t('header.brand_alt')" class="h-7 transition-opacity group-hover:opacity-80">
            </a>
            <template x-if="state">
              <div class="contents">
                <div class="hidden sm:block w-px h-7 bg-[var(--imin-border)]"></div>
                <div class="min-w-0 flex-1">
                  <div class="section-label" x-text="t('header.campaign')"></div>
                  <button type="button" @click="goToCampaigns()"
                          class="font-semibold text-[15px] text-[var(--imin-text)] truncate text-left hover:underline focus:outline-none"
                          :title="t('header.back_to_campaigns_title')"
                          x-text="state.campaign.topic"></button>
                </div>
                <div class="hidden sm:flex flex-col items-end shrink-0">
                  <div class="section-label" x-text="t('header.search')"></div>
                  <div class="flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full"
                          :class="{
                            'bg-amber-500 animate-pulse': isSearchRunning,
                            'bg-slate-400': !isSearchRunning && searchStatusLabel === 'idle',
                            'bg-slate-300': searchStatusLabel === 'empty',
                          }"></span>
                    <span class="text-xs font-medium text-[var(--imin-text-muted)] capitalize" x-text="t('campaigns.status.' + searchStatusLabel)"></span>
                  </div>
                </div>
                <div class="hidden sm:flex flex-col items-end shrink-0">
                  <div class="section-label" x-text="t('header.progress')"></div>
                  <div class="text-sm text-[var(--imin-text)] font-medium tabular-nums">
                    <span x-text="state.progress.reviewed"></span> /
                    <span x-text="state.progress.total"></span>
                  </div>
                </div>
              </div>
            </template>
            <template x-if="!state">
              <div class="flex-1"></div>
            </template>
            <button type="button" class="btn btn-ghost shrink-0 text-xs uppercase tracking-wider"
                    @click="toggleLocale()"
                    :title="t('header.lang_switch_title')"
                    x-text="locale === 'ru' ? 'EN' : 'RU'"></button>
            <template x-if="hasToken">
              <button type="button"
                      @click="logout()"
                      class="btn btn-ghost shrink-0"
                      :title="t('header.logout_title')"
                      x-text="t('header.logout')"></button>
            </template>
          </div>
          <template x-if="state">
            <div class="progress-track">
              <div class="progress-fill"
                   :style="`width: ${(state.progress.reviewed / Math.max(1, state.progress.total)) * 100}%`"></div>
            </div>
          </template>
        </header>

        <main class="max-w-5xl mx-auto px-6 py-8">
          <!-- ───── Overview ───── -->
          <template x-if="screen === 'overview'">
            <div x-data="overviewScreen()" x-init="init()" class="animate-fade-in">
              <button class="inline-flex items-center gap-1.5 text-sm text-[var(--imin-text-muted)] hover:text-[var(--imin-navy)] mb-4 transition-colors"
                      @click="drillUp()">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                <span x-text="t('overview.back')"></span>
              </button>
              <!-- Search-execution status banner -->
              <div class="card p-4 mb-5 flex items-center gap-4 flex-wrap"
                   :class="{
                     'border-amber-200 bg-amber-50/40': isSearchRunning,
                     'border-[var(--imin-border)]': !isSearchRunning,
                   }">
                <div class="flex items-center gap-2.5 min-w-0 flex-1">
                  <span class="w-3 h-3 rounded-full shrink-0"
                        :class="{
                          'bg-amber-500 animate-pulse': isSearchRunning,
                          'bg-slate-400': !isSearchRunning && searchStatusLabel === 'idle',
                          'bg-slate-300': searchStatusLabel === 'empty',
                        }"></span>
                  <div class="min-w-0">
                    <div class="text-sm font-semibold text-[var(--imin-text)]">
                      <template x-if="isSearchRunning"><span x-text="t('overview.search.running')"></span></template>
                      <template x-if="!isSearchRunning && searchStatusLabel === 'idle'"><span x-text="t('overview.search.idle')"></span></template>
                      <template x-if="searchStatusLabel === 'empty'"><span x-text="t('overview.search.empty')"></span></template>
                    </div>
                    <div class="text-xs text-[var(--imin-text-muted)] mt-0.5">
                      <template x-if="latestBlockUpdatedAt">
                        <span x-text="t('overview.search.last_activity', { time: new Date(latestBlockUpdatedAt).toLocaleTimeString(locale === 'en' ? 'en-US' : 'ru-RU') })"></span>
                      </template>
                      <template x-if="!latestBlockUpdatedAt">
                        <span x-text="t('overview.search.skip_processed')"></span>
                      </template>
                    </div>
                  </div>
                </div>
                <template x-if="!isSearchRunning">
                  <button class="btn btn-primary shrink-0"
                          @click="goToSearchForResume()">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.5 12a7.5 7.5 0 0113.5-4.5M19.5 12a7.5 7.5 0 01-13.5 4.5"/>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 3v4.5h-4.5M6 21v-4.5h4.5"/>
                    </svg>
                    <span x-text="hasResumeConfig ? t('overview.search.resume') : t('overview.search.start')"></span>
                  </button>
                </template>
                <template x-if="resumeMessage">
                  <div class="text-xs text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-md px-3 py-1.5 w-full"
                       x-text="resumeMessage"></div>
                </template>
                <template x-if="resumeError">
                  <div class="text-xs text-red-700 bg-red-50 border border-red-200 rounded-md px-3 py-1.5 w-full"
                       x-text="resumeError"></div>
                </template>
              </div>
              <!-- ───── Publish / cascade banner ─────────────────────────
                   Slots:
                   1) Has publishable rows (decided but not cascaded) — emerald
                      banner. Text varies: "Готово" if all reviewed, otherwise
                      "Готово к частичной публикации" with progress hint.
                   2) Has cascaded rows — blue rollback banner.
                   Both can be visible simultaneously: e.g. half the story
                   cascaded earlier, the other half just got reviewed. -->
              <template x-if="hasPublishableRows">
                <div class="card p-4 mb-5 border-emerald-300 bg-emerald-50/60 flex items-center gap-4 flex-wrap">
                  <div class="flex items-center gap-2.5 min-w-0 flex-1">
                    <span class="text-2xl shrink-0">🎯</span>
                    <div class="min-w-0">
                      <div class="text-sm font-semibold text-emerald-900">
                        <template x-if="readyToPublish"><span x-text="t('overview.publish.banner.ready')"></span></template>
                        <template x-if="!readyToPublish"><span x-text="t('overview.publish.banner.partial')"></span></template>
                      </div>
                      <div class="text-xs text-emerald-800 mt-0.5">
                        <span x-text="t('overview.publish.banner.subtitle', { count: publishableRowCount })"></span>
                        <template x-if="unreviewedRowCount > 0">
                          <span x-text="t('overview.publish.banner.unreviewed', { count: unreviewedRowCount })"></span>
                        </template>
                      </div>
                    </div>
                  </div>
                  <button class="btn btn-primary shrink-0" @click="openPublishModal()" :disabled="publishBusy"
                          x-text="t('overview.publish.button', { count: publishableRowCount, word: publishableRowCount === 1 ? t('overview.publish.button_word_one') : t('overview.publish.button_word_many') })"></button>
                </div>
              </template>
              <template x-if="hasCascadedRows">
                <div class="card p-4 mb-5 border-blue-300 bg-blue-50/60 flex items-center gap-4 flex-wrap">
                  <div class="flex items-center gap-2.5 min-w-0 flex-1">
                    <span class="text-2xl shrink-0">✅</span>
                    <div class="min-w-0">
                      <div class="text-sm font-semibold text-blue-900" x-text="t('overview.cascade.banner.title')"></div>
                      <div class="text-xs text-blue-800 mt-0.5" x-text="t('overview.cascade.banner.subtitle', { count: state.progress.cascaded || 0 })"></div>
                    </div>
                  </div>
                  <button class="btn btn-danger shrink-0" @click="rollbackStory(null)" :disabled="publishBusy"
                          x-text="t('overview.cascade.rollback_campaign')"></button>
                </div>
              </template>
              <template x-if="publishMessage">
                <div class="card p-3 mb-3 border-emerald-200 bg-emerald-50 text-sm text-emerald-800" x-text="publishMessage"></div>
              </template>
              <template x-if="publishError">
                <div class="card p-3 mb-3 border-red-200 bg-red-50 text-sm text-red-800" x-text="publishError"></div>
              </template>

              <template x-if="serverConfig">
                <div class="card p-0 mb-3 overflow-hidden">
                  <button type="button"
                          class="w-full flex items-center justify-between gap-3 px-4 py-3 text-left hover:bg-slate-50 transition-colors"
                          @click="toggleConfig()">
                    <div class="flex items-center gap-2 min-w-0">
                      <span class="text-base">⚙️</span>
                      <span class="text-sm font-semibold text-[var(--imin-text)]" x-text="t('overview.config.title')"></span>
                      <span class="text-xs text-[var(--imin-text-muted)] truncate" x-text="serverConfig.keyword ? ('· ' + serverConfig.keyword) : ''"></span>
                    </div>
                    <span class="text-xs text-[var(--imin-text-muted)]" x-text="configOpen ? '▴' : '▾'"></span>
                  </button>
                  <div x-show="configOpen" x-collapse>
                    <div class="px-4 pb-4 pt-1 border-t border-[var(--imin-border)]">
                      <dl class="grid grid-cols-1 sm:grid-cols-[max-content,1fr] gap-x-4 gap-y-2 text-xs">
                        <template x-for="entry in configEntries()" :key="entry.key">
                          <div class="contents">
                            <dt class="font-mono text-[var(--imin-text-muted)] uppercase tracking-wider whitespace-nowrap" x-text="entry.key"></dt>
                            <dd class="text-[var(--imin-text)] break-words whitespace-pre-wrap" x-text="entry.value"></dd>
                          </div>
                        </template>
                      </dl>
                    </div>
                  </div>
                </div>
              </template>

              <div class="flex items-end justify-between mb-6 gap-3">
                <div>
                  <h1 class="text-2xl font-bold text-[var(--imin-text)] tracking-tight" x-text="t('overview.stories_title')"></h1>
                  <div class="text-sm text-[var(--imin-text-muted)] mt-1">
                    <span x-text="t('overview.stories_subtitle', { stories: groups.length, blocks: state.progress.total })"></span> ·
                    <span class="locale-chip ml-1" x-text="state.campaign.source_locale"></span>
                  </div>
                </div>
                <div class="flex items-center gap-2">
                  <button class="btn btn-ghost" @click="goToSearch()">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    <span x-text="t('campaigns.new')"></span>
                  </button>
                  <button type="button"
                          class="help-pill"
                          :title="t('help.title')"
                          @click="helpOpen = true">?</button>
                </div>
              </div>

              <ul class="list-stack stagger-fade">
                <template x-for="g in groups" :key="g.story_id">
                  <li class="card card-interactive group"
                      :data-story-id="g.story_id"
                      :class="{ 'focus-ring-active': focusedStoryId === g.story_id }"
                      @click="focusedStoryId = g.story_id; goToStory(g.story_id)">
                    <div class="px-5 py-4 flex items-center justify-between gap-4">
                      <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-2 mb-1">
                          <span class="locale-chip" x-text="g.locale"></span>
                          <span class="slug-mono truncate" x-text="g.story_full_slug"></span>
                        </div>
                        <div class="font-medium text-[15px] text-[var(--imin-text)] truncate" x-text="g.story_name"></div>
                      </div>
                      <div class="flex items-center gap-1.5 shrink-0">
                        <template x-for="badge in storyBadges(g)" :key="badge.label">
                          <span class="badge"
                                :class="'badge-' + badge.label"
                                x-text="badge.label + ' ' + badge.count"></span>
                        </template>
                        <template x-if="cascadeStateByStory[g.story_id] && cascadeStateByStory[g.story_id].cascaded && !cascadeStateByStory[g.story_id].partial">
                          <span class="badge bg-blue-100 text-blue-800" :title="t('overview.story.badge.published_title')" x-text="t('overview.story.badge.published')"></span>
                        </template>
                        <template x-if="cascadeStateByStory[g.story_id] && cascadeStateByStory[g.story_id].partial">
                          <span class="badge bg-blue-100 text-blue-800" :title="t('overview.story.badge.published_partial_title')" x-text="t('overview.story.badge.published_partial')"></span>
                        </template>
                        <template x-if="cascadeStateByStory[g.story_id] && cascadeStateByStory[g.story_id].translation">
                          <button class="text-base ml-1 cursor-help select-none transition-opacity hover:opacity-100"
                                  :class="{
                                    'opacity-100': cascadeStateByStory[g.story_id].translation.status === 'triggered' || cascadeStateByStory[g.story_id].translation.status === 'queued',
                                    'opacity-50': cascadeStateByStory[g.story_id].translation.status === 'no_targets' || cascadeStateByStory[g.story_id].translation.status === 'skipped',
                                    'opacity-100 text-amber-600': cascadeStateByStory[g.story_id].translation.status === 'stale',
                                  }"
                                  @click.stop="cascadeStateByStory[g.story_id].translation.status === 'stale' ? retryTranslation(g.story_id) : null"
                                  :disabled="publishBusy"
                                  :title="translationTooltip(g.story_id)">🌍</button>
                        </template>
                        <template x-if="cascadeStateByStory[g.story_id] && cascadeStateByStory[g.story_id].cascaded">
                          <button class="btn btn-ghost text-xs ml-1"
                                  @click.stop="rollbackStory(g.story_id)"
                                  :disabled="publishBusy"
                                  :title="t('overview.story.rollback_title')">↶</button>
                        </template>
                        <svg class="w-4 h-4 text-[var(--imin-text-subtle)] ml-1 transition-transform group-hover:translate-x-0.5"
                             fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                      </div>
                    </div>
                  </li>
                </template>
              </ul>
            </div>
          </template>

          <!-- ───── Story review ───── -->
          <template x-if="screen === 'story'">
            <div x-data="storyScreen()" x-init="init()" class="animate-fade-in">
              <button class="inline-flex items-center gap-1.5 text-sm text-[var(--imin-text-muted)] hover:text-[var(--imin-navy)] mb-4 transition-colors"
                      @click="goToOverview()">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Все stories
              </button>

              <template x-if="!group">
                <div class="card p-6">
                  <div class="skeleton h-6 w-2/3 mb-3"></div>
                  <div class="skeleton h-4 w-1/2"></div>
                </div>
              </template>

              <template x-if="group">
                <div>
                  <!-- Story header -->
                  <div class="mb-6 animate-slide-up">
                    <div class="flex items-center gap-2 mb-2">
                      <span class="locale-chip" x-text="group.locale"></span>
                      <span class="text-xs font-mono text-[var(--imin-text-subtle)]" x-text="group.story_full_slug"></span>
                    </div>
                    <div class="flex items-center gap-3">
                      <h1 class="story-title" x-text="group.story_name"></h1>
                      <button type="button"
                              class="help-pill shrink-0"
                              :title="t('help.title')"
                              @click="helpOpen = true">?</button>
                    </div>
                  </div>

                  <!-- Block cards -->
                  <ul class="list-stack stagger-fade">
                    <template x-for="block in group.blocks" :key="block.row_id">
                      <li class="card p-5"
                          :data-row-id="block.row_id"
                          :class="{ 'focus-ring-active': focusedRowId === block.row_id }"
                          @click="focusedRowId = block.row_id"
                          x-data="blockCard(block.row_id)" x-init="init()">

                        <!-- Block header -->
                        <div class="flex items-center justify-between gap-3 mb-3">
                          <div class="flex items-center gap-2 min-w-0 flex-1">
                            <span class="field-label" x-text="block.block_component"></span>
                            <span class="text-[var(--imin-text-subtle)]">·</span>
                            <span class="field-label" x-text="block.block_path"></span>
                          </div>
                          <div class="flex items-center gap-1.5 shrink-0">
                            <span class="badge"
                                  :class="'badge-' + block.status"
                                  x-text="t('status.' + block.status)"></span>
                            <template x-if="isPublished(block)">
                              <span class="badge bg-blue-100 text-blue-800"
                                    :title="t('story.published_badge_title')"
                                    x-text="t('story.published_badge')"></span>
                            </template>
                          </div>
                        </div>

                        <!-- LLM reasoning -->
                        <div class="text-xs text-[var(--imin-text-muted)] italic mb-3 flex items-start gap-1.5">
                          <svg class="w-3.5 h-3.5 mt-0.5 shrink-0 text-[var(--imin-text-subtle)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                          </svg>
                          <span x-text="block.llm_match_reason"></span>
                        </div>

                        <!-- Per-block context: live link + Storyblok admin link
                             + collapsible neighbor preview. Helps editor judge
                             "is this really the 5 we mean?" without leaving SPA. -->
                        <div class="flex flex-wrap items-center gap-2 mb-3 text-xs">
                          <a :href="_root.blockLiveUrl(block)" target="_blank" rel="noopener"
                             class="btn btn-ghost text-xs"
                             :title="t('block.open_live_title')"
                             x-text="t('block.open_live')"></a>
                          <a :href="_root.blockStoryblokUrl(block)" target="_blank" rel="noopener"
                             class="btn btn-ghost text-xs"
                             :title="t('block.open_storyblok_title')"
                             x-text="t('block.open_storyblok')"></a>
                          <button type="button" class="btn btn-ghost text-xs"
                                  @click="_root.toggleContext(block.row_id)"
                                  x-text="_root.contextOpenByRow[block.row_id] ? t('block.context_hide') : t('block.context_show')"></button>
                        </div>

                        <div x-show="_root.contextOpenByRow[block.row_id]" x-collapse>
                          <div class="mb-4 rounded-md border border-[var(--imin-border)] bg-[var(--imin-bg)] p-3 space-y-3 text-xs">
                            <template x-if="!_root.storyContentCache[block.story_id]">
                              <div class="text-[var(--imin-text-muted)] italic" x-text="t('block.context_loading')"></div>
                            </template>
                            <template x-if="_root.storyContentCache[block.story_id]">
                              <div class="space-y-3">
                                <!-- Section / heading breadcrumb above the block -->
                                <template x-if="_root.blockNeighbors(block).heading_path && _root.blockNeighbors(block).heading_path.length">
                                  <div>
                                    <div class="font-mono text-[10px] uppercase tracking-wider text-[var(--imin-text-subtle)] mb-1" x-text="t('block.context_section')"></div>
                                    <div class="text-[var(--imin-text)]" x-text="_root.blockNeighbors(block).heading_path.join(' › ')"></div>
                                  </div>
                                </template>
                                <!-- Table cell anchoring: caption + column + row -->
                                <template x-if="_root.blockNeighbors(block).table_context">
                                  <div class="rounded border border-[var(--imin-border)] bg-white p-2 space-y-1">
                                    <template x-if="_root.blockNeighbors(block).table_context.caption">
                                      <div>
                                        <span class="font-mono text-[10px] uppercase tracking-wider text-[var(--imin-text-subtle)] mr-1.5" x-text="t('block.context_table_caption')"></span>
                                        <span class="text-[var(--imin-text)]" x-text="_root.blockNeighbors(block).table_context.caption"></span>
                                      </div>
                                    </template>
                                    <template x-if="_root.blockNeighbors(block).table_context.row_label">
                                      <div>
                                        <span class="font-mono text-[10px] uppercase tracking-wider text-[var(--imin-text-subtle)] mr-1.5" x-text="t('block.context_table_row')"></span>
                                        <span class="font-semibold text-[var(--imin-text)]" x-text="_root.blockNeighbors(block).table_context.row_label"></span>
                                      </div>
                                    </template>
                                    <template x-if="_root.blockNeighbors(block).table_context.column">
                                      <div>
                                        <span class="font-mono text-[10px] uppercase tracking-wider text-[var(--imin-text-subtle)] mr-1.5" x-text="t('block.context_table_column')"></span>
                                        <span class="font-semibold text-[var(--imin-text)]" x-text="_root.blockNeighbors(block).table_context.column"></span>
                                      </div>
                                    </template>
                                  </div>
                                </template>
                                <template x-if="_root.blockNeighbors(block).prev && _root.blockNeighbors(block).prev.excerpt">
                                  <div>
                                    <div class="font-mono text-[10px] uppercase tracking-wider text-[var(--imin-text-subtle)] mb-1">
                                      <span x-text="t('block.context_prev')"></span>
                                      · <span x-text="_root.blockNeighbors(block).prev.component"></span>
                                    </div>
                                    <div class="text-[var(--imin-text)] whitespace-pre-wrap break-words" x-text="_root.blockNeighbors(block).prev.excerpt"></div>
                                  </div>
                                </template>
                                <template x-if="_root.blockNeighbors(block).next && _root.blockNeighbors(block).next.excerpt">
                                  <div>
                                    <div class="font-mono text-[10px] uppercase tracking-wider text-[var(--imin-text-subtle)] mb-1">
                                      <span x-text="t('block.context_next')"></span>
                                      · <span x-text="_root.blockNeighbors(block).next.component"></span>
                                    </div>
                                    <div class="text-[var(--imin-text)] whitespace-pre-wrap break-words" x-text="_root.blockNeighbors(block).next.excerpt"></div>
                                  </div>
                                </template>
                                <template x-if="!_root.blockHasContext(block)">
                                  <div class="text-[var(--imin-text-muted)] italic" x-text="t('block.context_none')"></div>
                                </template>
                              </div>
                            </template>
                          </div>
                        </div>

                        <!-- Whole-block deletion proposal banner. Shown ABOVE
                             the field cards so the diff stays visible — editor
                             still wants to read the block's content to decide
                             whether the LLM's "delete" is correct. -->
                        <template x-if="block.status === 'proposed_delete'">
                          <div class="mb-4 px-3 py-2.5 rounded-md border-2 border-red-300 bg-red-50 text-red-900 text-sm flex items-start gap-2">
                            <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                            </svg>
                            <div>
                              <div class="font-semibold mb-0.5" x-text="t('story.proposed_delete.title')"></div>
                              <div class="text-xs text-red-800" x-text="t('story.proposed_delete.body')"></div>
                            </div>
                          </div>
                        </template>

                        <!-- Per-field diff cards -->
                        <div class="space-y-3">
                          <template x-for="fieldName in fieldsToShow(block)" :key="fieldName">
                            <div class="field-card">
                              <div class="field-label mb-2 flex items-center gap-2">
                                <span x-text="fieldName"></span>
                                <template x-if="!hasChanges(block, fieldName)">
                                  <span class="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded"
                                        style="background: rgba(255, 149, 0, 0.18); color: #b45309;"
                                        x-text="t('story.field.no_changes')"></span>
                                </template>
                              </div>
                              <template x-if="hasChanges(block, fieldName)">
                                <div class="diff-output text-[14px]"
                                     x-html="diffHTML(
                                       String(getByPath(block.original_payload, fieldName) ?? ''),
                                       String((getByPath(block.edited_payload, fieldName) ?? getByPath(block.proposed_payload, fieldName) ?? getByPath(block.original_payload, fieldName)) ?? '')
                                     )"></div>
                              </template>
                              <template x-if="!hasChanges(block, fieldName)">
                                <div class="text-[14px] text-[var(--imin-text-muted)]"
                                     style="white-space: pre-wrap; word-break: break-word; line-height: 1.6;"
                                     x-text="String(getByPath(block.original_payload, fieldName) ?? '')"></div>
                              </template>
                            </div>
                          </template>
                        </div>

                        <!-- Action area -->
                        <div class="mt-5"
                             x-data="blockActions(block.row_id)" x-init="init()"
                             @row-action.window="onRowAction($event.detail)">

                          <!-- Action button rows. Per-status button labels &
                               ordering, but they all share the editing pane
                               (rendered once below) since edit logic is the
                               same regardless of how editor reached it. -->
                          <template x-if="(block.status === 'proposed' || block.status === 'pending' || block.status === 'error') && !editing">
                            <div class="flex flex-wrap gap-2">
                              <button class="btn btn-success" :disabled="busy" @click.stop="onAccept()" x-text="t('story.action.accept')"></button>
                              <button class="btn btn-warning" :disabled="busy" @click.stop="startEdit()" x-text="t('story.action.edit')"></button>
                              <button class="btn btn-neutral" :disabled="busy" @click.stop="openSkipModal()" x-text="t('story.action.skip')"></button>
                              <button class="btn btn-danger ml-auto" :disabled="busy" @click.stop="openDeleteConfirm()" x-text="t('story.action.delete')"></button>
                            </div>
                          </template>

                          <!-- proposed_delete = LLM proposed FULL block removal.
                               Primary CTA confirms deletion (action='delete' →
                               status='deleted'), not text accept. Editor can
                               also override into edit or keep the block. -->
                          <template x-if="block.status === 'proposed_delete' && !editing">
                            <div class="flex flex-wrap gap-2">
                              <button class="btn btn-danger" :disabled="busy" @click.stop="openDeleteConfirm()" x-text="t('story.action.confirm_delete')"></button>
                              <button class="btn btn-warning" :disabled="busy" @click.stop="startEdit()" x-text="t('story.action.edit_instead')"></button>
                              <button class="btn btn-neutral ml-auto" :disabled="busy" @click.stop="openSkipModal()" x-text="t('story.action.skip_keep')"></button>
                            </div>
                          </template>

                          <!-- Inline editor (shared across all not-yet-decided
                               statuses). Triggered from any status row via
                               startEdit(); commits land in edited_payload. -->
                          <div x-show="editing"
                               x-transition:enter="transition ease-out duration-200"
                               x-transition:enter-start="opacity-0 translate-y-1"
                               x-transition:enter-end="opacity-100 translate-y-0"
                               class="space-y-3">
                            <template x-for="fieldName in fieldsToShow(block)" :key="fieldName">
                              <div>
                                <div class="field-label mb-1.5" x-text="fieldName"></div>
                                <textarea class="edit-textarea" rows="4" x-model="editedFields[fieldName]"></textarea>
                              </div>
                            </template>
                            <div class="flex gap-2 pt-1">
                              <button class="btn btn-success" :disabled="busy" @click.stop="onAcceptEdited()" x-text="t('story.action.save_apply')"></button>
                              <button class="btn btn-ghost" :disabled="busy" @click.stop="cancelEdit()" x-text="t('common.cancel')"></button>
                            </div>
                          </div>

                          <!-- Decided pill + revert/rollback buttons. Two
                               distinct undo paths:
                               - "Откатить решение" (revert) — drops status
                                 back to proposed; SAFE, fully local.
                               - "Откатить публикацию" (cascade-rollback) —
                                 ONLY shown when block is cascaded; fetches
                                 current Storyblok story, splices snapshot
                                 version of THIS block back, PUTs as draft.
                                 Other blocks of the story are left alone. -->
                          <template x-if="['accepted','edited','skipped','deleted'].includes(block.status)">
                            <div class="flex items-center justify-between gap-3 flex-wrap">
                              <div class="inline-flex items-center gap-2 text-sm text-[var(--imin-text-muted)]">
                                <span class="w-2 h-2 rounded-full"
                                      :class="{
                                        'bg-emerald-500': block.status === 'accepted' || block.status === 'edited',
                                        'bg-slate-400': block.status === 'skipped',
                                        'bg-red-500': block.status === 'deleted'
                                      }"></span>
                                <span x-text="t('story.decided')"></span><span class="font-medium text-[var(--imin-text)]" x-text="t('status.' + block.status)"></span>
                              </div>
                              <div class="flex items-center gap-2">
                                <template x-if="_root && _root.isCurrentlyPublished(block)">
                                  <button class="btn btn-warning text-sm"
                                          :disabled="busy || (_root && _root.publishBusy)"
                                          @click.stop="_root.rollbackBlock(block.row_id)"
                                          :title="t('story.action.rollback_publish_title')"
                                          x-text="t('story.action.rollback_publish')"></button>
                                </template>
                                <button class="btn btn-ghost text-sm"
                                        :disabled="busy"
                                        @click.stop="onRevert()"
                                        :title="t('story.action.revert_decision_title')"
                                        x-text="t('story.action.revert_decision')"></button>
                              </div>
                            </div>
                          </template>

                          <template x-if="error">
                            <div class="mt-2 text-xs text-red-700 bg-red-50 border border-red-200 rounded px-2 py-1.5"
                                 x-text="t('common.error_prefix') + error"></div>
                          </template>

                          <!-- Skip modal — teleported to body to escape per-block stacking context -->
                          <template x-teleport="body">
                          <div x-show="skipModal"
                               x-transition.opacity
                               role="dialog"
                               aria-modal="true"
                               :aria-labelledby="'skip-modal-title-' + block.row_id"
                               x-effect="if (skipModal) { $nextTick(() => { const el = document.querySelector('[role=dialog][aria-labelledby=&quot;skip-modal-title-' + block.row_id + '&quot;] input, [role=dialog][aria-labelledby=&quot;skip-modal-title-' + block.row_id + '&quot;] button, [role=dialog][aria-labelledby=&quot;skip-modal-title-' + block.row_id + '&quot;] textarea'); if (el && el.focus) el.focus(); }); }"
                               class="modal-backdrop"
                               @click.self="closeSkipModal()">
                            <div class="modal-panel" @click.stop>
                              <h3 class="text-lg font-semibold mb-1" :id="'skip-modal-title-' + block.row_id" x-text="t('skip.modal.title')"></h3>
                              <p class="text-sm text-[var(--imin-text-muted)] mb-4" x-text="t('skip.modal.subtitle')"></p>

                              <div class="space-y-2 text-sm">
                                <template x-for="opt in skipReasonOptions" :key="opt.value">
                                  <label class="flex items-start gap-2.5 cursor-pointer p-2 rounded-md hover:bg-[var(--imin-bg)] transition-colors">
                                    <input type="radio" :value="opt.value" x-model="skipForm.category"
                                           class="mt-0.5 accent-[var(--imin-navy)]">
                                    <span class="text-[var(--imin-text)]" x-text="t('skip.reason.' + opt.value)"></span>
                                  </label>
                                </template>
                              </div>

                              <textarea class="edit-textarea mt-3"
                                        rows="3" :placeholder="t('skip.modal.comment_placeholder')"
                                        x-model="skipForm.comment"></textarea>

                              <div class="flex justify-end gap-2 mt-4">
                                <button class="btn btn-ghost" @click="closeSkipModal()" x-text="t('common.cancel')"></button>
                                <button class="btn btn-primary" :disabled="busy" @click="confirmSkip()" x-text="t('skip.modal.submit')"></button>
                              </div>
                            </div>
                          </div>
                          </template>

                          <!-- Delete modal — teleported to body -->
                          <template x-teleport="body">
                          <div x-show="deleteModal"
                               x-transition.opacity
                               role="dialog"
                               aria-modal="true"
                               :aria-labelledby="'delete-modal-title-' + block.row_id"
                               x-effect="if (deleteModal) { $nextTick(() => { const el = document.querySelector('[role=dialog][aria-labelledby=&quot;delete-modal-title-' + block.row_id + '&quot;] button'); if (el && el.focus) el.focus(); }); }"
                               class="modal-backdrop"
                               @click.self="closeDeleteConfirm()">
                            <div class="modal-panel" @click.stop>
                              <h3 class="text-lg font-semibold mb-2" :id="'delete-modal-title-' + block.row_id" x-text="t('story.delete_confirm.title')"></h3>
                              <p class="text-sm text-[var(--imin-text-muted)] mb-4" x-text="t('story.delete_confirm.body')"></p>
                              <div class="flex justify-end gap-2">
                                <button class="btn btn-ghost" @click="closeDeleteConfirm()" x-text="t('common.cancel')"></button>
                                <button class="btn btn-danger" :disabled="busy" @click="confirmDelete()" x-text="t('story.delete_confirm.confirm')"></button>
                              </div>
                            </div>
                          </div>
                          </template>
                        </div>
                      </li>
                    </template>
                  </ul>

                  <!-- Footer actions -->
                  <div class="mt-8 flex flex-wrap items-center justify-between gap-3 border-t border-[var(--imin-border)] pt-5">
                    <button class="btn btn-ghost" @click="goToOverview()" x-text="t('story.footer.back_to_stories')"></button>
                    <div class="flex flex-wrap gap-2">
                      <button class="btn btn-success"
                              :disabled="!hasPendingBlocks() || bulkAccepting"
                              @click="bulkAcceptRemaining()">
                        <span x-show="!bulkAccepting" x-text="t('story.footer.accept_remaining', { count: pendingBlockCount() })"></span>
                        <span x-show="bulkAccepting" class="inline-flex items-center gap-2">
                          <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
                          </svg>
                          <span x-text="t('story.footer.accepting')"></span>
                        </span>
                      </button>
                      <button class="btn btn-primary"
                              :disabled="hasPendingBlocks()"
                              @click="advanceToNextStory()"
                              x-text="t('story.footer.save_next')"></button>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </template>

          <!-- ───── Done state ───── -->
          <template x-if="screen === 'done'">
            <div class="animate-scale-in">
              <div class="card p-10 text-center max-w-2xl mx-auto">
                <div class="text-6xl mb-3 inline-block animate-pulse-once">🎉</div>
                <h1 class="text-3xl font-bold tracking-tight text-[var(--imin-text)] mb-2" x-text="t('done.title_alt')"></h1>
                <p class="text-[15px] text-[var(--imin-text-muted)] mb-8 max-w-md mx-auto" x-text="t('done.subtitle_alt')"></p>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8">
                  <div class="bg-emerald-50 border border-emerald-100 rounded-xl p-4">
                    <div class="text-3xl font-bold text-emerald-700 tabular-nums"
                         x-text="(state.progress.by_status.accepted || 0) + (state.progress.by_status.edited || 0)"></div>
                    <div class="text-[11px] uppercase font-semibold tracking-wider text-emerald-700 mt-1" x-text="t('done.metric.accepted_edited')"></div>
                  </div>
                  <div class="bg-slate-50 border border-slate-200 rounded-xl p-4">
                    <div class="text-3xl font-bold text-slate-700 tabular-nums"
                         x-text="state.progress.by_status.skipped || 0"></div>
                    <div class="text-[11px] uppercase font-semibold tracking-wider text-slate-700 mt-1" x-text="t('done.metric.skipped')"></div>
                  </div>
                  <div class="bg-red-50 border border-red-100 rounded-xl p-4">
                    <div class="text-3xl font-bold text-red-700 tabular-nums"
                         x-text="state.progress.by_status.deleted || 0"></div>
                    <div class="text-[11px] uppercase font-semibold tracking-wider text-red-700 mt-1" x-text="t('done.metric.deleted')"></div>
                  </div>
                  <div class="bg-amber-50 border border-amber-100 rounded-xl p-4">
                    <div class="text-3xl font-bold text-amber-700 tabular-nums"
                         x-text="state.progress.by_status.error || 0"></div>
                    <div class="text-[11px] uppercase font-semibold tracking-wider text-amber-700 mt-1" x-text="t('done.metric.errors')"></div>
                  </div>
                </div>
                <button class="btn btn-ghost mx-auto" @click="goToOverview()" x-text="t('done.back_to_overview')"></button>
              </div>
            </div>
          </template>

          <!-- ───── Search / new campaign ───── -->
          <template x-if="screen === 'search'">
            <div x-data="searchScreen()" x-init="init()" class="animate-fade-in max-w-3xl mx-auto">
              <button class="inline-flex items-center gap-1.5 text-sm text-[var(--imin-text-muted)] hover:text-[var(--imin-navy)] mb-5 transition-colors"
                      @click="goToOverview()">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                <span x-text="t('search.back')"></span>
              </button>

              <!-- Form view -->
              <template x-if="!submitted && !submitting">
                <div>
                  <div class="mb-7">
                    <div class="section-label mb-1" x-text="t('search.section.new_campaign')"></div>
                    <h1 class="story-title" x-text="t('search.section.find_articles')"></h1>
                    <p class="text-sm text-[var(--imin-text-muted)] mt-2" x-text="t('search.intro')"></p>
                  </div>

                  <div class="card p-6 mb-4">
                    <div class="flex items-center justify-between mb-4">
                      <div class="section-label" x-text="t('search.section.campaign_meta')"></div>
                      <button type="button" class="btn btn-link text-xs" @click="fillExample()" x-text="t('search.fill_example_short')"></button>
                    </div>

                    <div class="space-y-4">
                      <label class="block">
                        <span class="text-xs font-semibold text-[var(--imin-text-muted)] mb-1.5 block" x-text="t('search.field.topic_label')"></span>
                        <input type="text" x-model="form.campaign_topic"
                               placeholder="Portugal Golden Visa: 5 → 10 years"
                               class="edit-textarea" style="font-family: inherit;">
                        <div class="text-xs text-[var(--imin-text-subtle)] mt-1.5" x-text="t('search.field.topic_hint_alt')"></div>
                      </label>

                      <label class="block">
                        <span class="text-xs font-semibold text-[var(--imin-text-muted)] mb-1.5 block">
                          <span x-text="t('search.field.campaign_id_label')"></span>
                          <span class="text-[var(--imin-text-subtle)] font-normal" x-text="t('search.field.optional_paren')"></span>
                        </span>
                        <input type="text" x-model="form.campaign_id"
                               :placeholder="suggestedCampaignId()"
                               class="edit-textarea">
                        <div class="text-xs text-[var(--imin-text-subtle)] mt-1.5" x-text="t('search.field.campaign_id_hint_alt')"></div>
                      </label>
                    </div>
                  </div>

                  <div class="card p-6 mb-4">
                    <div class="section-label mb-4" x-text="t('search.section.search')"></div>

                    <div class="space-y-4">
                      <label class="block">
                        <span class="text-xs font-semibold text-[var(--imin-text-muted)] mb-1.5 block" x-text="t('search.field.keyword_label')"></span>
                        <input type="text" x-model="form.keyword"
                               placeholder="5"
                               class="edit-textarea">
                        <div class="text-xs text-[var(--imin-text-subtle)] mt-1.5" x-text="t('search.field.keyword_hint_alt')"></div>
                      </label>

                      <label class="block">
                        <span class="text-xs font-semibold text-[var(--imin-text-muted)] mb-1.5 block">
                          <span x-text="t('search.field.block_required_label')"></span>
                          <span class="text-[var(--imin-text-subtle)] font-normal" x-text="'— ' + t('search.field.optional_paren').replace(/^\(|\)$/g, '')"></span>
                        </span>
                        <input type="text" x-model="form.block_required_keywords"
                               placeholder="years"
                               class="edit-textarea">
                        <div class="text-xs text-[var(--imin-text-subtle)] mt-1.5" x-html="t('search.field.block_required_hint_alt')"></div>
                      </label>

                      <label class="block">
                        <span class="text-xs font-semibold text-[var(--imin-text-muted)] mb-1.5 block">
                          <span x-text="t('search.field.article_any_label')"></span>
                          <span class="text-[var(--imin-text-subtle)] font-normal" x-text="'— ' + t('search.field.optional_paren').replace(/^\(|\)$/g, '')"></span>
                        </span>
                        <input type="text" x-model="form.article_any_keywords"
                               placeholder="Portugal, Golden Visa"
                               class="edit-textarea">
                        <div class="text-xs text-[var(--imin-text-subtle)] mt-1.5" x-text="t('search.field.article_any_hint_alt')"></div>
                      </label>

                      <label class="block">
                        <span class="text-xs font-semibold text-[var(--imin-text-muted)] mb-1.5 block" x-text="t('search.field.context_label')"></span>
                        <textarea rows="3" x-model="form.context_description"
                                  placeholder='Mention of "5 years" specifically as the residency period required to apply for Portuguese citizenship via naturalisation.'
                                  class="edit-textarea" style="font-family: inherit;"></textarea>
                        <div class="text-xs text-[var(--imin-text-subtle)] mt-1.5" x-text="t('search.field.context_hint_alt')"></div>
                      </label>

                      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <label class="block">
                          <span class="text-xs font-semibold text-[var(--imin-text-muted)] mb-1.5 block" x-text="t('search.field.source_locale_label')"></span>
                          <select x-model="form.source_locale" class="edit-textarea" style="font-family: inherit;">
                            <option value="ru" x-text="t('search.field.locale_opt_ru')"></option>
                            <option value="en" x-text="t('search.field.locale_opt_en')"></option>
                          </select>
                          <div class="text-xs text-[var(--imin-text-subtle)] mt-1.5" x-text="t('search.field.source_locale_hint')"></div>
                        </label>

                        <label class="block">
                          <span class="text-xs font-semibold text-[var(--imin-text-muted)] mb-1.5 block">
                            <span x-text="t('search.field.folder_label')"></span>
                            <span class="text-[var(--imin-text-subtle)] font-normal" x-text="t('search.field.optional_paren')"></span>
                          </span>
                          <input type="text" x-model="form.folder"
                                 placeholder="immigrantinvest/new-blog"
                                 class="edit-textarea">
                          <div class="text-xs text-[var(--imin-text-subtle)] mt-1.5" x-text="t('search.field.folder_hint_alt')"></div>
                        </label>
                      </div>

                      <label class="block">
                        <span class="text-xs font-semibold text-[var(--imin-text-muted)] mb-1.5 block">
                          <span x-text="t('search.field.content_type_label')"></span>
                          <span class="text-[var(--imin-text-subtle)] font-normal" x-text="t('search.field.optional_paren')"></span>
                        </span>
                        <input type="text" x-model="form.content_type"
                               placeholder="flatArticle"
                               class="edit-textarea">
                      </label>
                    </div>
                  </div>

                  <div class="card p-6 mb-4">
                    <div class="section-label mb-4" x-text="t('search.section.rewrite_policy')"></div>
                    <label class="block">
                      <span class="text-xs font-semibold text-[var(--imin-text-muted)] mb-1.5 block" x-text="t('search.field.rewrite_label')"></span>
                      <textarea rows="5" x-model="form.rewrite_prompt"
                                placeholder='Update content where Portugal Golden Visa requires 10 years (not 5) for citizenship eligibility...'
                                class="edit-textarea" style="font-family: inherit;"></textarea>
                      <div class="text-xs text-[var(--imin-text-subtle)] mt-1.5" x-text="t('search.field.rewrite_hint_alt')"></div>
                    </label>
                  </div>

                  <div class="card p-6 mb-6">
                    <label class="flex items-start gap-3 cursor-pointer">
                      <input type="checkbox" x-model="form.dry_run" class="mt-0.5 accent-[var(--imin-navy)] w-4 h-4">
                      <div>
                        <div class="text-sm font-medium text-[var(--imin-text)]" x-text="t('search.field.dry_run_label')"></div>
                        <div class="text-xs text-[var(--imin-text-muted)] mt-0.5" x-html="t('search.field.dry_run_hint_alt')"></div>
                      </div>
                    </label>
                  </div>

                  <template x-if="error">
                    <div class="card p-4 mb-4 border-red-200" style="background: rgba(255, 59, 48, 0.06); border-color: rgba(255, 59, 48, 0.22);">
                      <div class="flex items-start gap-2.5">
                        <svg class="w-4 h-4 mt-0.5 shrink-0 text-[var(--status-red-fg)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M5.07 19h13.86c1.54 0 2.5-1.67 1.73-3L13.73 4a2 2 0 00-3.46 0L3.34 16c-.77 1.33.19 3 1.73 3z"></path>
                        </svg>
                        <div class="text-sm text-[var(--status-red-fg)]" x-text="t('search.error_prefix') + error"></div>
                      </div>
                    </div>
                  </template>

                  <div class="flex items-center justify-between gap-3">
                    <button class="btn btn-ghost" @click="goToOverview()" x-text="t('search.cancel')"></button>
                    <button class="btn btn-primary" :disabled="!canSubmit()" @click="submit()" x-text="t('search.submit_alt')"></button>
                  </div>
                </div>
              </template>

              <!-- Submitting / progress view -->
              <template x-if="submitting && !submitted">
                <div class="card p-8">
                  <div class="flex items-center gap-3 mb-6">
                    <div class="relative w-10 h-10">
                      <div class="absolute inset-0 rounded-full border-2 border-[var(--imin-navy-tint)]"></div>
                      <div class="absolute inset-0 rounded-full border-2 border-transparent border-t-[var(--imin-navy)] animate-spin"></div>
                    </div>
                    <div>
                      <div class="font-semibold text-[var(--imin-text)]" x-text="form.campaign_topic || t('search.progress.untitled')"></div>
                      <div class="section-label mt-0.5">
                        <span x-show="progress.stage === 'queued'" x-text="t('search.progress.queued_label')"></span>
                        <span x-show="progress.stage === 'fetching'" x-text="t('search.progress.fetching_label')"></span>
                        <span x-show="progress.stage === 'filtering'" x-text="t('search.progress.filtering_label')"></span>
                        <span x-show="progress.stage === 'rewriting'" x-text="t('search.progress.rewriting_label')"></span>
                      </div>
                    </div>
                  </div>

                  <!-- n8n doesn't stream progress, so just show a friendly
                       "this will take a while" message. -->
                  <div class="space-y-3">
                    <div class="field-card text-sm text-[var(--imin-text-muted)]" x-html="t('search.progress.long_note')"></div>
                  </div>

                  <template x-if="error">
                    <div class="mt-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded-xl px-4 py-3" x-text="error"></div>
                  </template>
                </div>
              </template>

              <!-- Done / Queued view -->
              <template x-if="submitted">
                <div class="card p-8 text-center animate-scale-in">
                  <div class="w-12 h-12 mx-auto mb-4 rounded-full bg-[var(--status-green-bg)] flex items-center justify-center">
                    <svg class="w-6 h-6 text-[var(--status-green-fg)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                    </svg>
                  </div>

                  <div>
                    <h2 class="text-xl font-semibold tracking-tight text-[var(--imin-text)] mb-2" x-text="t('search.done.title')"></h2>
                    <p class="text-sm text-[var(--imin-text-muted)] mb-5" x-html="t('search.done.slack_note')"></p>
                    <div class="field-card max-w-sm mx-auto mb-6 text-left">
                      <div class="field-label mb-1" x-text="t('search.done.campaign_id_label')"></div>
                      <div class="font-mono text-sm text-[var(--imin-text)] break-all" x-text="queuedCampaignId"></div>
                      <div class="field-label mt-3 mb-1" x-text="t('search.done.queued_at_label')"></div>
                      <div class="font-mono text-xs text-[var(--imin-text-muted)]" x-text="queuedAt"></div>
                    </div>
                    <div class="flex justify-center gap-2 flex-wrap">
                      <button class="btn btn-ghost" @click="reset(); goToSearch()" x-text="t('search.done.new')"></button>
                      <a class="btn btn-primary" :href="reviewQueueUrl()" x-text="t('search.done.open_review')"></a>
                    </div>
                    <p class="text-xs text-[var(--imin-text-subtle)] mt-4" x-text="t('search.done.empty_note')"></p>
                  </div>
                </div>
              </template>
            </div>
          </template>
        </main>

        <!-- Footer with brand -->
        <footer class="max-w-5xl mx-auto px-6 py-8 mt-12 text-center">
          <div class="text-xs text-[var(--imin-text-subtle)]">
            <span x-text="t('footer.tagline')"></span> · <a href="https://immigrantinvest.com/" target="_blank" rel="noopener" class="text-[var(--imin-text-muted)] hover:text-[var(--imin-navy)] transition-colors" x-text="t('header.brand_alt')"></a>
          </div>
        </footer>
      </div>
    </template>

    <!-- Publish (cascade) modal — opened from overview's "🚀 Опубликовать" button -->
    <div x-show="publishModalOpen"
         x-transition.opacity
         role="dialog"
         aria-modal="true"
         aria-labelledby="publish-modal-title"
         class="modal-backdrop"
         @click.self="closePublishModal()">
      <div class="modal-panel max-w-xl" @click.stop>
        <div class="flex items-center justify-between mb-3">
          <h3 id="publish-modal-title" class="text-lg font-semibold" x-text="t('publish.modal.title')"></h3>
          <button type="button"
                  class="text-[var(--imin-text-subtle)] hover:text-[var(--imin-text)] text-2xl leading-none transition-colors"
                  @click="closePublishModal()">&times;</button>
        </div>

        <p class="text-sm text-[var(--imin-text-muted)] mb-4">
          <span x-text="t('publish.modal.intro')"></span><strong x-text="publishableRowCount"></strong><span x-text="t('publish.modal.intro_count')"></span>
          <template x-if="unreviewedRowCount > 0">
            <span class="text-amber-800" x-text="t('publish.modal.intro_unreviewed', { count: unreviewedRowCount })"></span>
          </template>
          <span class="block mt-2 text-xs" x-text="t('publish.modal.intro_phase2b_alt')"></span>
        </p>

        <template x-if="state && state.campaign">
          <div class="field-card mb-4">
            <div class="text-xs text-[var(--imin-text-subtle)] uppercase tracking-wider mb-1" x-text="t('publish.modal.source_label_alt')"></div>
            <div class="text-sm font-mono" x-text="state.campaign.source_locale + t('publish.modal.source_master_suffix')"></div>
            <div class="text-xs text-[var(--imin-text-subtle)] mt-2" x-text="t('publish.modal.source_hint')"></div>
          </div>
        </template>

        <div class="mb-4">
          <div class="field-label mb-2" x-text="t('publish.modal.mode_label_alt')"></div>
          <div class="space-y-2">
            <label class="flex items-start gap-2.5 p-3 rounded-md border cursor-pointer transition-colors"
                   :class="!publishImmediately ? 'border-emerald-300 bg-emerald-50/40' : 'border-[var(--imin-border)] hover:bg-[var(--imin-bg)]'">
              <input type="radio" name="publish-mode" :value="false" :checked="!publishImmediately" @change="publishImmediately = false" class="mt-0.5 accent-[var(--imin-navy)]">
              <div>
                <div class="text-sm font-semibold text-[var(--imin-text)]" x-text="t('publish.modal.mode_draft')"></div>
                <div class="text-xs text-[var(--imin-text-muted)] mt-0.5" x-text="t('publish.modal.mode_draft_hint')"></div>
              </div>
            </label>
            <label class="flex items-start gap-2.5 p-3 rounded-md border cursor-pointer transition-colors"
                   :class="publishImmediately ? 'border-amber-300 bg-amber-50/60' : 'border-[var(--imin-border)] hover:bg-[var(--imin-bg)]'">
              <input type="radio" name="publish-mode" :value="true" :checked="publishImmediately" @change="publishImmediately = true" class="mt-0.5 accent-[var(--imin-navy)]">
              <div>
                <div class="text-sm font-semibold text-[var(--imin-text)]" x-text="t('publish.modal.mode_publish')"></div>
                <div class="text-xs text-[var(--imin-text-muted)] mt-0.5" x-text="t('publish.modal.mode_publish_hint')"></div>
              </div>
            </label>
          </div>
        </div>

        <div class="text-xs text-[var(--imin-text-muted)] bg-[var(--imin-bg)] rounded-md p-3 mb-4">
          <strong x-text="t('publish.modal.safety_prefix')"></strong><span x-text="t('publish.modal.safety_body')"></span>
        </div>

        <template x-if="publishError">
          <div class="text-sm text-red-700 bg-red-50 border border-red-200 rounded-md px-3 py-2 mb-3" x-text="publishError"></div>
        </template>

        <div class="flex justify-end gap-2">
          <button class="btn btn-ghost" @click="closePublishModal()" :disabled="publishBusy" x-text="t('common.cancel')"></button>
          <button class="btn"
                  :class="publishImmediately ? 'btn-warning' : 'btn-primary'"
                  @click="confirmPublish()" :disabled="publishBusy">
            <span x-show="!publishBusy" x-text="publishImmediately ? t('publish.modal.submit_publish') : t('publish.modal.submit_draft')"></span>
            <span x-show="publishBusy" x-text="t('publish.modal.submitting')"></span>
          </button>
        </div>
      </div>
    </div>

    <!-- Keyboard shortcuts help overlay -->
    <div x-show="helpOpen"
         x-transition.opacity
         role="dialog"
         aria-modal="true"
         aria-labelledby="help-modal-title"
         x-effect="if (helpOpen) { $nextTick(() => { const el = document.querySelector('[aria-labelledby=&quot;help-modal-title&quot;] button'); if (el && el.focus) el.focus(); }); }"
         class="modal-backdrop"
         @click.self="helpOpen = false">
      <div class="modal-panel max-w-lg" @click.stop>
        <div class="flex items-center justify-between mb-4">
          <h3 id="help-modal-title" class="text-lg font-semibold" x-text="t('help.title')"></h3>
          <button type="button"
                  class="text-[var(--imin-text-subtle)] hover:text-[var(--imin-text)] text-2xl leading-none transition-colors"
                  @click="helpOpen = false">&times;</button>
        </div>

        <div class="text-sm space-y-5">
          <div>

            <div class="section-label mb-2" x-text="t('help.section.story')"></div>
            <table class="w-full">
              <tbody class="divide-y divide-[var(--imin-border)]">
                <tr><td class="py-1.5 pr-3 font-mono text-xs text-[var(--imin-navy)] align-top whitespace-nowrap">j / &darr;</td><td class="py-1.5 text-[var(--imin-text)]" x-text="t('help.shortcut.next_block')"></td></tr>
                <tr><td class="py-1.5 pr-3 font-mono text-xs text-[var(--imin-navy)] align-top whitespace-nowrap">k / &uarr;</td><td class="py-1.5 text-[var(--imin-text)]" x-text="t('help.shortcut.prev_block')"></td></tr>
                <tr><td class="py-1.5 pr-3 font-mono text-xs text-[var(--imin-navy)] align-top whitespace-nowrap">a / Space</td><td class="py-1.5 text-[var(--imin-text)]" x-text="t('help.shortcut.accept')"></td></tr>
                <tr><td class="py-1.5 pr-3 font-mono text-xs text-[var(--imin-navy)] align-top whitespace-nowrap">Shift+A</td><td class="py-1.5 text-[var(--imin-text)]" x-text="t('help.shortcut.bulk_accept')"></td></tr>
                <tr><td class="py-1.5 pr-3 font-mono text-xs text-[var(--imin-navy)] align-top whitespace-nowrap">e</td><td class="py-1.5 text-[var(--imin-text)]" x-text="t('help.shortcut.edit')"></td></tr>
                <tr><td class="py-1.5 pr-3 font-mono text-xs text-[var(--imin-navy)] align-top whitespace-nowrap">s</td><td class="py-1.5 text-[var(--imin-text)]" x-text="t('help.shortcut.skip')"></td></tr>
                <tr><td class="py-1.5 pr-3 font-mono text-xs text-[var(--imin-navy)] align-top whitespace-nowrap">d</td><td class="py-1.5 text-[var(--imin-text)]" x-text="t('help.shortcut.delete')"></td></tr>
                <tr><td class="py-1.5 pr-3 font-mono text-xs text-[var(--imin-navy)] align-top whitespace-nowrap">u</td><td class="py-1.5 text-[var(--imin-text)]" x-text="t('help.shortcut.undo')"></td></tr>
                <tr><td class="py-1.5 pr-3 font-mono text-xs text-[var(--imin-navy)] align-top whitespace-nowrap">n</td><td class="py-1.5 text-[var(--imin-text)]" x-text="t('help.shortcut.next_story')"></td></tr>
                <tr><td class="py-1.5 pr-3 font-mono text-xs text-[var(--imin-navy)] align-top whitespace-nowrap">b</td><td class="py-1.5 text-[var(--imin-text)]" x-text="t('help.shortcut.back')"></td></tr>
                <tr><td class="py-1.5 pr-3 font-mono text-xs text-[var(--imin-navy)] align-top whitespace-nowrap">Esc</td><td class="py-1.5 text-[var(--imin-text)]" x-text="t('help.shortcut.escape')"></td></tr>
              </tbody>
            </table>
          </div>

          <div>
            <div class="section-label mb-2" x-text="t('help.section.overview')"></div>
            <table class="w-full">
              <tbody class="divide-y divide-[var(--imin-border)]">
                <tr><td class="py-1.5 pr-3 font-mono text-xs text-[var(--imin-navy)] align-top whitespace-nowrap">j / &darr;</td><td class="py-1.5 text-[var(--imin-text)]" x-text="t('help.shortcut.next_story_o')"></td></tr>
                <tr><td class="py-1.5 pr-3 font-mono text-xs text-[var(--imin-navy)] align-top whitespace-nowrap">k / &uarr;</td><td class="py-1.5 text-[var(--imin-text)]" x-text="t('help.shortcut.prev_story')"></td></tr>
                <tr><td class="py-1.5 pr-3 font-mono text-xs text-[var(--imin-navy)] align-top whitespace-nowrap">Enter / o</td><td class="py-1.5 text-[var(--imin-text)]" x-text="t('help.shortcut.open_story')"></td></tr>
              </tbody>
            </table>
          </div>

          <div>
            <div class="section-label mb-2" x-text="t('help.section.anywhere')"></div>
            <table class="w-full">
              <tbody class="divide-y divide-[var(--imin-border)]">
                <tr><td class="py-1.5 pr-3 font-mono text-xs text-[var(--imin-navy)] align-top whitespace-nowrap">? / /</td><td class="py-1.5 text-[var(--imin-text)]" x-text="t('help.shortcut.help_toggle')"></td></tr>
                <tr><td class="py-1.5 pr-3 font-mono text-xs text-[var(--imin-navy)] align-top whitespace-nowrap">Esc</td><td class="py-1.5 text-[var(--imin-text)]" x-text="t('help.shortcut.help_close')"></td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="flex justify-end mt-6">
          <button class="btn btn-primary" @click="helpOpen = false" x-text="t('common.close')"></button>
        </div>
      </div>
    </div>

    <!-- Global error toast -->
    <div x-show="globalError"
         x-transition:enter="transition ease-out duration-220"
         x-transition:enter-start="opacity-0 translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         role="status"
         aria-live="polite"
         class="fixed bottom-4 right-4 max-w-sm bg-red-600 text-white text-sm rounded-xl shadow-2xl px-4 py-3 cursor-pointer z-50 flex items-start gap-2"
         @click="globalError = null">
      <span class="text-lg leading-none">⚠️</span>
      <div class="min-w-0 flex-1">
        <div class="font-semibold mb-0.5" x-text="t('common.error')"></div>
        <div x-text="globalError"></div>
        <div class="text-xs opacity-80 mt-1" x-text="t('common.click_to_dismiss')"></div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js?v=29"></script>
</body>
</html>
